apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: infinarena
type: Opaque
stringData:
  AUTH_TOKEN_SECRET: "CHANGE_ME_TO_A_STRONG_SECRET"
  DATABASE_URL: "postgresql://infinarena:CHANGE_ME@postgresql:5432/infinarena"
  REDIS_URL: "redis://redis:6379"
