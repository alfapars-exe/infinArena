name: Sync to Hugging Face

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      HF_USERNAME: argeinfina
      HF_SPACE: infinarena
      HF_TOKEN: ${{ secrets.HF_TOKEN || secrets.HUGGINGFACE_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate required secret
        run: |
          if [ -z "${HF_TOKEN}" ]; then
            echo "::error::Missing HF_TOKEN secret. Add it in GitHub repo Settings > Secrets and variables > Actions."
            exit 1
          fi

      - name: Push to Hugging Face
        run: |
          HF_REMOTE="https://${HF_USERNAME}:${HF_TOKEN}@huggingface.co/spaces/${HF_USERNAME}/${HF_SPACE}.git"
          git remote add hf "${HF_REMOTE}" || git remote set-url hf "${HF_REMOTE}"
          git push hf HEAD:main --force-with-lease
